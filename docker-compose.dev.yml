version: '3.9'

# Development override — only runs PostgreSQL
# Run backend + frontend locally with npm

services:
  postgres:
    image: postgres:16-alpine
    container_name: vapeshop_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: vapeshop
      POSTGRES_PASSWORD: vapeshop_pass
      POSTGRES_DB: vapeshop_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  postgres_dev_data:
